<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>報到系統 | 佳里奇美醫院114年度教育訓練</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body { font-family:'Noto Sans TC',sans-serif; background: linear-gradient(135deg,#E6E6FA,#FFFFFF); margin:0; padding:0; color:#000; overflow-x:hidden; position:relative; }
.bubble { position:absolute; border-radius:50%; opacity:0.5; pointer-events:none; z-index:0; }
.navbar { background-color: #4B0082 !important; background: rgba(10,10,10,0.85); backdrop-filter: blur(10px); border-bottom:1px solid rgba(255,255,255,0.1); }
.navbar-brand, .nav-link { color:#FFFFFF !important; font-weight:700; }
.nav-link:hover, .nav-link.active { color:#FFD700 !important; }
h2 { color:#4B0082; font-weight:600; text-shadow:1px 1px 3px rgba(0,0,0,0.2); }
.card { background: rgba(255,255,255,0.9); border-radius:15px; padding:25px; box-shadow:0 10px 25px rgba(0,0,0,0.3); margin-bottom:40px; position:relative; z-index:1; }
.refresh-btn { background: linear-gradient(90deg,#4B0082,#7B68EE); color:#fff; border:none; font-weight:600; border-radius:10px; padding:10px 25px; transition:0.3s; }
.refresh-btn:hover { background: linear-gradient(90deg,#7B68EE,#9370DB); transform:scale(1.05); }
.timer { font-size:0.9rem; color:#4B0082; }
.table-responsive { max-height: 600px; overflow-y: auto; }
#checkinTable thead.table-dark th { background-color: #4B0082 !important; color: #FFFFFF !important; position: sticky; top: 0; z-index: 2; }
#checkinTable tbody tr:nth-child(even) { background-color: #F3E8FF; }
#checkinTable tbody tr:nth-child(odd) { background-color: #FFFFFF; }
.checked td { font-weight:700 !important; color:#1E90FF !important; background-color:#EAF6FF !important; }
.filter-input { width: 100%; font-size: 0.85rem; padding: 3px; border: 1px solid #ccc; border-radius: 5px; text-align: center; }
.small-text { font-size: 0.85rem; color: #555; }
#stats { font-size:1rem; font-weight:600; margin-bottom:15px; text-align:center; color:#4B0082; }
footer { text-align:center; color:#555; background: rgba(255,255,255,0.1); padding:15px; font-size:0.95rem; margin-top:60px; }
#checkinTable th:nth-child(2), #checkinTable td:nth-child(2) { position: sticky; left: 0; background: #FFFFFF !important; z-index: 5; white-space: nowrap; }
#overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; backdrop-filter: blur(15px) brightness(0.6); background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; color: #fff; text-align: center; }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container">
    <a class="navbar-brand" href="#">
       <img src="chimei-logo-green.png" alt="奇美醫院" style="height:36px; margin-right:8px;">
       佳里奇美醫院 114年度教育訓練
    </a>
  </div>
</nav>

<main class="container" style="padding-top:100px;">

<div class="text-center mb-5">
  <h2 id="mainTitle">📝 線上報到表單</h2>
  <p class="text-dark">請與會人員於現場填寫下方表單進行報到</p>
</div>

<div class="card mb-4 p-4" style="max-width:700px;margin:auto;">
  <form id="customCheckinForm">
    <div class="mb-3">
      <label class="form-label">身分別</label>
      <select name="identity" class="form-control" id="identitySelect" required>
        <option value="">請選擇</option>
        <option value="院內人員">院內人員</option>
        <option value="院外嘉賓">院外嘉賓（含未完成報名）</option>
      </select>
    </div>
    <div class="mb-3" id="internalField" style="display:none;">
      <label class="form-label">人事號（院內人員專用）</label>
      <input type="text" name="internal" class="form-control" placeholder="輸入人事號">
    </div>
   <div class="mb-3" id="externalField" style="display:none;">
      <label class="form-label">嘉賓姓名</label>
      <input type="text" name="external" class="form-control" placeholder="輸入姓名">
    </div>
    <div class="mb-3">
      <label class="form-label">備註(選填)</label>
      <input type="text" name="remark" class="form-control" placeholder="其他說明">
    </div>
    <div class="text-center">
      <button type="submit" class="refresh-btn">✅ 送出報到</button>
    </div>
    <div id="formMessage" class="mt-2 text-center"></div>
  </form>
</div>

<div class="text-center mb-4">
  <h2>✅ 即時報到名單</h2>
  <div class="d-flex justify-content-center align-items-center gap-3 mb-3">
    <button class="refresh-btn" onclick="fetchCheckinData()">⟳ 手動更新名單</button>
    <span id="countdown" class="timer"></span>
  </div>
  <div class="d-flex justify-content-center align-items-center gap-2 mb-3">
    <input id="globalSearch" type="text" class="form-control w-50" placeholder="🔍 全欄搜尋">
    <button class="refresh-btn" onclick="filterTable()">🔍 搜尋</button>
  </div>
</div>

<div id="stats"></div>

<div class="card">
  <div class="table-responsive">
    <table class="table align-middle text-center" id="checkinTable">
      <thead class="table-dark">
        <tr>
          <th>序號</th>
          <th>姓名</th>
          <th>科別</th>
          <th>單位/職類</th>
          <th>狀態</th>
          <th>報到時間</th>
          <th>備註</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="7" class="text-center text-muted">資料載入中...</td></tr>
      </tbody>
    </table>
  </div>
</div>
</main>

<footer>© 2026 佳里奇美醫院．教學研究組</footer>

<script>
// 設定區
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxH03n3XhaRuE1gqyVfq9bLN_0XLYOutWy9uWdF94sHYUL0jdQcFsKKx71I6laMTBc/exec";
const urlParams = new URLSearchParams(window.location.search);
const currentCourseId = urlParams.get('course_id') || '01';
const isGuestAllowed = urlParams.get('guest') === 'true';

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('mainTitle').textContent = `📝 第 ${currentCourseId} 堂課程報到`;
    animateBubbles();
    fetchCheckinData();
});

// 欄位切換
const identitySelect = document.getElementById('identitySelect');
identitySelect.addEventListener('change', ()=>{
    document.getElementById('internalField').style.display = (identitySelect.value==='院內人員') ? 'block' : 'none';
    document.getElementById('externalField').style.display = (identitySelect.value==='院外嘉賓') ? 'block' : 'none';
});

// 送出報到
document.getElementById('customCheckinForm').addEventListener('submit', async e => {
    e.preventDefault();
    const form = e.target;
    const msg = document.getElementById('formMessage');
    msg.textContent = "處理中...";
    
    const params = new URLSearchParams({
        identity: form.identity.value,
        internal: form.internal.value,
        external: form.external.value,
        remark: form.remark.value,
        course_id: currentCourseId,
        allow_guest: isGuestAllowed
    });

    try {
        const res = await fetch(WEB_APP_URL, { method: 'POST', body: params });
        const result = await res.json();
        if(result.status === 'ok') {
            msg.className = "mt-2 text-success";
            msg.textContent = "✅ 報到成功！";
            form.reset();
            fetchCheckinData();
        } else {
            msg.className = "mt-2 text-danger";
            msg.textContent = result.status === 'not_found' ? "⚠️ 查無此人或不開放旁聽" : "❌ 報到失敗";
        }
    } catch(err) {
        msg.textContent = "⚠️ 連線失敗";
    }
});

// 抓取名單
async function fetchCheckinData() {
    const tableBody = document.getElementById('tableBody');
    try {
        const res = await fetch(`${WEB_APP_URL}?course_id=${currentCourseId}`);
        const data = await res.json();
        tableBody.innerHTML = '';
        let checked = 0;
        data.forEach((p, i) => {
            const row = document.createElement('tr');
            if(p.status === '已報到') { checked++; row.classList.add('checked'); }
            row.innerHTML = `<td>${i+1}</td><td>${p.name||''}</td><td>${p.department||''}</td><td>${p.unit||''}</td><td>${p.status||'未報到'}</td><td class="small-text">${p.time ? new Date(p.time).toLocaleString() : '—'}</td><td>${p.remark||''}</td>`;
            tableBody.appendChild(row);
        });
        document.getElementById('stats').innerHTML = `總計：${data.length} | 已報到：${checked}`;
    } catch(err) {
        tableBody.innerHTML = '<tr><td colspan="7">載入失敗</td></tr>';
    }
}

// 泡泡動畫 (簡化版)
function animateBubbles(){
    for(let i=0; i<20; i++){
        let b = document.createElement('div'); b.className = 'bubble';
        let size = Math.random()*30+10;
        b.style.width = size+'px'; b.style.height = size+'px';
        b.style.left = Math.random()*100+'vw'; b.style.top = Math.random()*100+'vh';
        b.style.background = '#D8BFD8';
        document.body.appendChild(b);
    }
}

// 自動更新
let counter = 150;
setInterval(() => {
    counter--;
    if(counter <= 0) { fetchCheckinData(); counter = 150; }
    document.getElementById('countdown').textContent = `⏳ ${counter} 秒後更新`;
}, 1000);

function filterTable(){
    const filter = document.getElementById('globalSearch').value.toLowerCase();
    const rows = document.querySelectorAll('#tableBody tr');
    rows.forEach(r => r.style.display = r.textContent.toLowerCase().includes(filter) ? '' : 'none');
}
</script>
</body>
</html>
